## Flox Environment Manifest -----------------------------------------
##
##   _Everything_ you need to know about the _manifest_ is here:
##
##   https://flox.dev/docs/reference/command-reference/manifest.toml/
##
## -------------------------------------------------------------------
# Flox manifest version managed by Flox CLI
version = 1


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
vllm-python312-cuda12_9-sm120.pkg-path = "flox/vllm-python312-cuda12_9-sm120"
vllm-python312-cuda12_9-sm120.systems = ["x86_64-linux"]
vllm-python312-cuda12_9-sm120.pkg-group = "vllm-python312-cuda12_9-sm120"
# gum.pkg-path = "gum"
# gum.version = "^0.14.5"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
VLLM_MODEL = "meta-llama/Llama-3.1-8B-Instruct"
VLLM_HOST = "127.0.0.1"
VLLM_PORT = "8000"
VLLM_API_KEY = "sk-vllm-local-dev"
VLLM_TENSOR_PARALLEL_SIZE = "1"
VLLM_PIPELINE_PARALLEL_SIZE = "1"
HF_HOME = "/home/daedalus/dev/vllm-runtime/models"
VLLM_LOGGING_LEVEL = "WARNING"
PROMETHEUS_MULTIPROC_DIR = "/tmp/vllm-prometheus"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = '''
  # Create HuggingFace model cache directory
  mkdir -p "$FLOX_ENV_PROJECT/models"

  # Create Prometheus multiprocess directory
  mkdir -p "$PROMETHEUS_MULTIPROC_DIR"

  # Validate config.yaml exists
  if [ ! -f "$FLOX_ENV_PROJECT/config.yaml" ]; then
    echo "WARNING: $FLOX_ENV_PROJECT/config.yaml not found"
    echo "  The vllm service will not start without it."
  fi
'''


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
# common = '''
#   gum style \
#   --foreground 212 --border-foreground 212 --border double \
#   --align center --width 50 --margin "1 2" --padding "2 4" \
#     $INTRO_MESSAGE
# '''
## Shell-specific customizations such as setting aliases go here:
# bash = ...
# zsh  = ...
# fish = ...


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
vllm.command = "vllm serve $VLLM_MODEL --config $FLOX_ENV_PROJECT/config.yaml --tensor-parallel-size $VLLM_TENSOR_PARALLEL_SIZE --pipeline-parallel-size $VLLM_PIPELINE_PARALLEL_SIZE"


## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
#     { dir = "../common" }
# ]


## Build and publish your own packages ------------------------------
##  $ flox build
##  $ flox publish
## ------------------------------------------------------------------
[build]
