  "manifest": {
    "version": 1,
    "install": {
      "vllm-flox-runtime": {
        "pkg-path": "flox/vllm-flox-runtime",
        "pkg-group": "vllm-flox-runtime",
        "systems": [
          "x86_64-linux"
        ]
      },
      "vllm-python312-cuda12_9-sm120": {
        "pkg-path": "flox/vllm-python312-cuda12_9-sm120",
        "pkg-group": "vllm-python312-cuda12_9-sm120",
        "systems": [
          "x86_64-linux"
        ]
      }
    },
    "hook": {
      "on-activate": "  # Model\n  export VLLM_MODEL=\"${VLLM_MODEL:-Llama-3.1-8B-Instruct}\"\n  export VLLM_MODEL_ORG=\"${VLLM_MODEL_ORG:-meta-llama}\"\n  export VLLM_MODEL_SOURCES=\"${VLLM_MODEL_SOURCES:-local,hf-cache,hf-hub}\"\n  export VLLM_MODELS_DIR=\"${VLLM_MODELS_DIR:-$FLOX_ENV_PROJECT/models}\"\n  export VLLM_SERVED_MODEL_NAME=\"${VLLM_SERVED_MODEL_NAME:-$VLLM_MODEL}\"\n\n  # Server\n  export VLLM_HOST=\"${VLLM_HOST:-127.0.0.1}\"\n  export VLLM_PORT=\"${VLLM_PORT:-8000}\"\n  export VLLM_API_KEY=\"${VLLM_API_KEY:-sk-vllm-local-dev}\"\n\n  # Engine tuning\n  export VLLM_TENSOR_PARALLEL_SIZE=\"${VLLM_TENSOR_PARALLEL_SIZE:-1}\"\n  export VLLM_PIPELINE_PARALLEL_SIZE=\"${VLLM_PIPELINE_PARALLEL_SIZE:-1}\"\n  export VLLM_PREFIX_CACHING=\"${VLLM_PREFIX_CACHING:-false}\"\n  export VLLM_KV_CACHE_DTYPE=\"${VLLM_KV_CACHE_DTYPE:-auto}\"\n  export VLLM_MAX_MODEL_LEN=\"${VLLM_MAX_MODEL_LEN:-4096}\"\n  export VLLM_MAX_NUM_BATCHED_TOKENS=\"${VLLM_MAX_NUM_BATCHED_TOKENS:-4096}\"\n\n  # Logging / metrics\n  export VLLM_LOGGING_LEVEL=\"${VLLM_LOGGING_LEVEL:-WARNING}\"\n  export PROMETHEUS_MULTIPROC_DIR=\"${PROMETHEUS_MULTIPROC_DIR:-/tmp/vllm-prometheus}\"\n\n  mkdir -p \"$VLLM_MODELS_DIR\"\n  mkdir -p \"$PROMETHEUS_MULTIPROC_DIR\"\n"
    },
    "profile": {},
    "options": {},
    "services": {
      "vllm": {
        "command": "vllm-preflight && vllm-resolve-model && vllm-serve"
      }
    }
  },
