      "vllm-phi-3-5-mini-instruct-awq": {
        "pkg-path": "flox/vllm-phi-3-5-mini-instruct-awq",
        "pkg-group": "vllm-phi-3-5-mini-instruct-awq"
      }
    },
    "hook": {
      "on-activate": "  # Model\n  export VLLM_MODEL=\"${VLLM_MODEL:-Phi-3.5-mini-instruct-AWQ}\"\n  export VLLM_MODEL_ORG=\"${VLLM_MODEL_ORG:-microsoft}\"\n  export VLLM_MODEL_SOURCES=\"${VLLM_MODEL_SOURCES:-flox,local,hf-cache,hf-hub}\"\n  export VLLM_MODELS_DIR=\"${VLLM_MODELS_DIR:-$FLOX_ENV_PROJECT/models}\"\n  export VLLM_SERVED_MODEL_NAME=\"${VLLM_SERVED_MODEL_NAME:-Phi-3.5-mini-instruct}\"\n\n  # Server\n  export VLLM_HOST=\"${VLLM_HOST:-0.0.0.0}\"\n  export VLLM_PORT=\"${VLLM_PORT:-8000}\"\n  export VLLM_API_KEY=\"${VLLM_API_KEY:-sk-vllm-local-dev}\"\n\n  # Engine tuning\n  export VLLM_TENSOR_PARALLEL_SIZE=\"${VLLM_TENSOR_PARALLEL_SIZE:-1}\"\n  export VLLM_PIPELINE_PARALLEL_SIZE=\"${VLLM_PIPELINE_PARALLEL_SIZE:-1}\"\n  export VLLM_PREFIX_CACHING=\"${VLLM_PREFIX_CACHING:-false}\"\n  export VLLM_KV_CACHE_DTYPE=\"${VLLM_KV_CACHE_DTYPE:-auto}\"\n  export VLLM_MAX_MODEL_LEN=\"${VLLM_MAX_MODEL_LEN:-4096}\"\n  export VLLM_MAX_NUM_BATCHED_TOKENS=\"${VLLM_MAX_NUM_BATCHED_TOKENS:-4096}\"\n  export VLLM_MAX_TOKENS=\"${VLLM_MAX_TOKENS:-1024}\"\n\n  # Logging / metrics\n  export VLLM_LOGGING_LEVEL=\"${VLLM_LOGGING_LEVEL:-WARNING}\"\n  export PROMETHEUS_MULTIPROC_DIR=\"${PROMETHEUS_MULTIPROC_DIR:-$FLOX_ENV_CACHE/vllm-prometheus}\"\n\n  # ── Reset vLLM cache if requested ──\n  if [[ \"${VLLM_RESET_CACHE:-0}\" == \"1\" ]]; then\n    echo \"VLLM_RESET_CACHE=1: removing vLLM cached files from $FLOX_ENV_CACHE\"\n    rm -f \"$FLOX_ENV_CACHE\"/vllm-config.yaml\n    rm -f \"$FLOX_ENV_CACHE\"/vllm-config.active.yaml\n    rm -f \"$FLOX_ENV_CACHE\"/vllm-model.*.env\n    rm -rf \"$FLOX_ENV_CACHE\"/vllm-prometheus\n    unset VLLM_RESET_CACHE\n  fi\n\n  mkdir -p \"$VLLM_MODELS_DIR\"\n  mkdir -p \"$PROMETHEUS_MULTIPROC_DIR\"\n\n  # ── Ensure vllm config has compilation disabled (nvcc not on PATH) ──\n  _vllm_config=\"$FLOX_ENV_CACHE/vllm-config.yaml\"\n  if [[ ! -f \"$_vllm_config\" ]]; then\n    cat > \"$_vllm_config\" <<'VLLM_YAML'\nhost: \"0.0.0.0\"\nport: 8000\n\ndtype: float16\ngpu-memory-utilization: 0.85\nquantization: awq\ncompilation-config: '{\"mode\": 0}'\n\nuvicorn-log-level: \"warning\"\nVLLM_YAML\n  elif ! grep -q 'compilation-config' \"$_vllm_config\"; then\n    printf '\\ncompilation-config: '\\''{\"mode\": 0}'\\''\\n' >> \"$_vllm_config\"\n  fi\n\n"
    },
    "options": {
      "systems": [
        "x86_64-linux"
      ]
    },
    "services": {
      "vllm": {
        "command": "vllm-preflight && vllm-resolve-model && vllm-serve"
      }
    }
  },
