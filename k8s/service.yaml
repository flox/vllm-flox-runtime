apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm
spec:
  # ClusterIP for internal access. Change to LoadBalancer or NodePort for
  # external access, or front with an Ingress resource.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
