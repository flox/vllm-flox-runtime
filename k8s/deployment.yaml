apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm
spec:
  # Single replica: vLLM holds GPU memory exclusively and model cache is
  # node-local (PVC is ReadWriteOnce). Scale by adding Deployments on
  # separate nodes, not by increasing replicas.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
      annotations:
        flox.dev/environment: "devusb/vllm-runtime"
        flox.dev/activate-mode: "dev"
        # Activate mode "run" (the default) is correct here — the on-activate
        # hook only sets env vars, creates directories, and generates config.
        # No build tools required.
    spec:
      runtimeClassName: flox

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: vllm-models
          emptyDir: {}

      containers:
        - name: vllm
          image: flox/empty:1.0.0
          command: ["sh", "-c", "vllm-preflight && vllm-resolve-model && vllm-serve"]

          env:
            # Override the default models directory to use the PVC mount path.
            # Without this, VLLM_MODELS_DIR defaults to $FLOX_ENV_PROJECT/models
            # which is ephemeral in Kubernetes.
            - name: VLLM_MODELS_DIR
              value: "/models"
            - name: VLLM_SKIP_GPU_CHECK
              value: "1"

            # ── Secrets ──
            # Uncomment and create the referenced Secret to enable:
            #
            # - name: VLLM_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: vllm-secrets
            #       key: api-key
            #
            # - name: HF_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: vllm-secrets
            #       key: hf-token

            # ── Optional tuning overrides ──
            # Uncomment any of these to override on-activate defaults:
            #
            # - name: VLLM_MODEL
            #   value: "Phi-4-mini-instruct-FP8-TORCHAO"
            # - name: VLLM_MODEL_ORG
            #   value: "microsoft"
            # - name: VLLM_TENSOR_PARALLEL_SIZE
            #   value: "1"
            # - name: VLLM_MAX_MODEL_LEN
            #   value: "4096"
            # - name: VLLM_MAX_NUM_BATCHED_TOKENS
            #   value: "4096"

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          resources:
            limits:
              nvidia.com/gpu: 1
              # cpu: "8"
              # memory: "32Gi"
            # requests:
            #   cpu: "2"
            #   memory: "16Gi"

          volumeMounts:
            - name: vllm-models
              mountPath: /models

          # ── Probes ──
          # startupProbe gates liveness/readiness until the pod is ready.
          # Budget: 60 failures * 10s = 600s (10 min) covers warm starts
          # with a cached model on PVC. For cold starts (first-time model
          # download), increase failureThreshold to 120 (20 min).
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
